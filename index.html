<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثَـــر | ATHAR LEGACY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --neon-2: #00f2ff; }
        
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #nfc-canvas { width: 100%; height: 100%; }

        #loading-screen { 
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); 
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s; 
        }

        .loading-content { width: 90%; text-align: center; z-index: 101; }
        .neon-msg { 
            font-size: 1.3rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); 
            opacity: 0; transition: opacity 0.4s; margin-bottom: 50px; min-height: 3.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .loader-wrapper { width: 60%; height: 2px; background: rgba(255,255,255,0.1); margin: 0 auto; }
        #loader-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.5s; }

        .card { 
            background: rgba(10, 30, 20, 0.92); padding: 2.5rem 2rem; 
            border-radius: 30px; border: 1px solid var(--neon); 
            width: 85%; max-width: 420px; z-index: 2; 
            backdrop-filter: blur(15px); text-align: center; 
            display: none; opacity: 0; transition: 0.8s; margin: 40px 0;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); 
        }

        h1 { margin: 0; font-size: 2.5rem; text-shadow: 0 0 15px var(--neon); letter-spacing: 5px; }
        .tagline { color: var(--neon-2); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }
        
        /* تصميم قسم المميزات */
        .features { display: flex; justify-content: space-around; margin: 30px 0; padding: 15px 5px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(0,255,204,0.1); }
        .feat-item { text-align: center; flex: 1; }
        .feat-item i { color: var(--neon); font-size: 1.4rem; margin-bottom: 8px; display: block; }
        .feat-item span { font-size: 0.65rem; color: #ccc; }

        .description { text-align: right; border-right: 3px solid var(--neon); padding-right: 15px; margin: 20px 0; }
        .description p { font-size: 0.9rem; line-height: 1.7; color: #ddd; margin: 10px 0; }

        .explore-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .explore-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        .info-box { background: rgba(255, 255, 255, 0.05); padding: 14px; border-radius: 15px; margin: 12px 0; border-right: 4px solid var(--neon); text-align: right; }
        .info-box strong { color: var(--neon-2); font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .info-box span { font-size: 1.05rem; color: #fff; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; text-decoration: none; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-call { background: var(--neon); }
        .btn-wa { background: #25D366; }

        input, select { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: #fff; border-radius: 10px; text-align: right; box-sizing: border-box; }
        #subBtn { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--neon), var(--neon-2)); border: none; border-radius: 12px; font-weight: bold; color: #000; margin-top: 15px; cursor: pointer; }
        
        .signature-area { margin-top: 40px; font-size: 0.65rem; color: #666; border-top: 1px solid #222; padding-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="canvas-container"><canvas id="nfc-canvas"></canvas></div>

<div id="loading-screen">
    <div class="loading-content">
        <div id="m-text" class="neon-msg"></div>
        <div class="loader-wrapper"><div id="loader-bar"></div></div>
    </div>
</div>

<div class="card" id="mainLanding">
    <h1>أثَـــر</h1>
    <div class="tagline">Where Art Meets Technology</div>
    
    <div class="description">
        <p>في <span style="color: var(--neon); font-weight: bold;">أثَـــر</span>، نحوّل القطع الفنية إلى مخازن رقمية للذكريات.</p>
        <p>دمجنا سحر الريزن اليدوي بتقنية NFC المتطورة لتخليد هويتك بلمسة واحدة من جوالك.</p>
    </div>

    <div class="features">
        <div class="feat-item">
            <i class="fas fa-microchip"></i>
            <span>ربط ذكي</span>
        </div>
        <div class="feat-item">
            <i class="fas fa-palette"></i>
            <span>فن يدوي</span>
        </div>
        <div class="feat-item">
            <i class="fas fa-shield-alt"></i>
            <span>خصوصية</span>
        </div>
    </div>

    <button class="explore-btn" onclick="alert('قريباً: معرض أعمال أثَر')">استكشف الأثر</button>

    <div class="signature-area">
        PROJECT BY: <span style="color: #999;">WELF BASSAM</span>
    </div>
</div>

<div class="card" id="displayCard">
    <h1>أثَـــر</h1>
    <div class="tagline">بيانات صاحب الأثر</div>
    <div id="displayFields"></div> <div class="btn-container">
        <a id="cBtn" class="btn btn-call"><i class="fas fa-phone"></i> اتصال</a>
        <a id="wBtn" class="btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
    </div>
</div>

<div class="card" id="regCard">
    <h1>أثَـــر</h1>
    <div class="tagline">تفعيل قطعة جديدة</div>
    <form id="regForm">
        <input type="text" id="regName" placeholder="الاسم الكامل *" required>
        <input type="tel" id="regPhone" placeholder="رقم الجوال *" required>
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني (اختياري)">
        <select id="regPlatform">
            <option value="">تطبيق التواصل (اختياري)</option>
            <option>Snapchat</option><option>Instagram</option><option>Telegram</option><option>X</option>
        </select>
        <input type="text" id="regAcc" placeholder="اسم المستخدم">
        <select id="regBlood">
            <option value="">فصيلة الدم</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
        <input type="text" id="regMed" placeholder="أمراض مزمنة أو حساسية؟">
        <input type="text" id="regPass" placeholder="كلمة السر (4 أرقام) *" pattern="\d{4}" maxlength="4" required>
        <input type="hidden" id="hCode">
        <button type="submit" id="subBtn">بث الحياة في أثرك</button>
    </form>
</div>

<script>
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbxMyRg-ci17i-_PEEOPr95W5EoU4skA4sGDdWk3D2q8QPeVMOfpQWjHsOKSBP3Q-bcq/exec';
    const code = new URLSearchParams(window.location.search).get('code');
    const bar = document.getElementById('loader-bar');
    const msgEl = document.getElementById('m-text');

    async function changeMsg(txt, p, duration = 1500) {
        msgEl.style.opacity = '0';
        await new Promise(r => setTimeout(r, 450));
        msgEl.innerText = txt;
        msgEl.style.opacity = '1';
        bar.style.width = p + '%';
        await new Promise(r => setTimeout(r, duration));
    }

    async function run() {
        if (!code) {
            await changeMsg('" كل ما نتركه خلفنا سيحكي عنا يوماً "', 100);
            finish('mainLanding');
            return;
        }
        await changeMsg('" كل ما نتركه خلفنا سيحكي عنا يوماً "', 30);
        await changeMsg('جاري البحث عن صاحب الأثر...', 70);
        try {
            const res = await fetch(`${webAppUrl}?read=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.status === "تم التفعيل") {
                renderData(data);
                await changeMsg('تم العثور على المعلومات!', 100, 800);
                finish('displayCard');
            } else {
                await changeMsg('مستخدم جديد.. مرحباً بك في عالم أثَر', 100, 1000);
                document.getElementById('hCode').value = code;
                finish('regCard');
            }
        } catch(e) { finish('mainLanding'); }
    }

    function renderData(data) {
        const container = document.getElementById('displayFields');
        let html = `
            <div class="info-box"><strong>صاحب الأثر</strong> <span>${data.name}</span></div>
            <div class="info-box"><strong>رقم الجوال</strong> <span>${data.phone}</span></div>
        `;
        if(data.email && data.email !== "undefined") html += `<div class="info-box"><strong>البريد الإلكتروني</strong> <span>${data.email}</span></div>`;
        if(data.blood) html += `<div class="info-box"><strong>فصيلة الدم</strong> <span>${data.blood}</span></div>`;
        if(data.medical && data.medical !== "undefined") html += `<div class="info-box"><strong>الحالة الصحية</strong> <span>${data.medical}</span></div>`;
        if(data.account && data.account !== "undefined") html += `<div class="info-box"><strong>حساب التواصل</strong> <span>${data.account}</span></div>`;
        
        container.innerHTML = html;
        document.getElementById('cBtn').href = `tel:${data.phone}`;
        document.getElementById('wBtn').href = `https://wa.me/${data.phone}`;
    }

    function finish(id) {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.opacity = '1', 50);
        }, 800);
    }

    // --- أنيميشن الدوائر الإلكترونية (PCB Animation) ---
    const canvas = document.getElementById('nfc-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<35; i++) particles.push(new Particle());
    }

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.speed = Math.random() * 1.2 + 0.6;
            this.life = Math.random() * 100 + 60;
            this.color = Math.random() > 0.5 ? '#00ffcc' : '#00f2ff';
            this.angle = (Math.floor(Math.random() * 8) * 45) * Math.PI / 180;
        }
        update() {
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.life--;
            if(Math.random() < 0.03) this.angle = (Math.floor(Math.random() * 8) * 45) * Math.PI / 180;
            if(this.life <= 0 || this.x<0 || this.x>w || this.y<0 || this.y>h) this.reset();
        }
        draw() {
            ctx.beginPath(); ctx.shadowBlur = 10; ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color; ctx.lineWidth = 1.3;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - Math.cos(this.angle)*18, this.y - Math.sin(this.angle)*18);
            ctx.stroke(); ctx.shadowBlur = 0;
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    init(); animate(); window.onload = run; window.onresize = init;

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = 'جاري الحفظ...'; btn.disabled = true;
        const p = document.getElementById('regPlatform').value;
        const a = document.getElementById('regAcc').value;
        const params = new URLSearchParams();
        params.append('name', document.getElementById('regName').value);
        params.append('phone', document.getElementById('regPhone').value);
        params.append('email', document.getElementById('regEmail').value);
        params.append('account', p ? p + ": " + a : a);
        params.append('bloodType', document.getElementById('regBlood').value);
        params.append('medical', document.getElementById('regMed').value);
        params.append('password', document.getElementById('regPass').value);
        params.append('itemCode', document.getElementById('hCode').value);
        fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: params })
        .then(() => { alert('تم التفعيل!'); location.reload(); });
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - ATHAR LEGACY</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; transition: opacity 1.5s; }
        #welcome-text { color: #2ecc71; font-size: 1.2rem; text-align: center; opacity: 0; transition: 1.5s; padding: 20px; }
        .card { background: rgba(10, 30, 20, 0.95); padding: 2rem; border-radius: 30px; border: 2px solid #2ecc71; width: 85%; max-width: 380px; z-index: 2; text-align: center; display: none; box-shadow: 0 0 30px rgba(46, 204, 113, 0.3); }
        h1 { font-size: 2.5rem; margin: 0; color: #fff; text-shadow: 0 0 10px #2ecc71; }
        .tagline { color: #00f2ff; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #2ecc71; color: #fff; border-radius: 10px; text-align: right; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: #2ecc71; color: #000; }
        .btn-call { background: #2ecc71; color: #000; text-decoration: none; display: block; margin-top: 20px; }
        .info-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; text-align: right; border: 1px solid rgba(46, 204, 113, 0.2); }
        .label { color: #00f2ff; font-size: 0.75rem; display: block; }
    </style>
</head>
<body>

<div id="welcome-screen"><div id="welcome-text">أهلاً بك في عالم أثَر.. جاري قراءة البيانات</div></div>

<div class="card" id="activateCard">
    <h1>أثَـــر</h1>
    <div class="tagline">تسجيل أثر جديد</div>
    <form action="https://script.google.com/macros/s/AKfycbw6rB7kFI9AqeoX6tBU6UM18ejOBitkCXnnbvoTgZr9UYy2MRpUOARMV_90cvyKV-Xf/exec" method="POST">
        <input type="text" name="name" placeholder="الاسم الكامل *" required>
        <input type="tel" name="phone" placeholder="رقم الجوال *" required>
        <input type="text" name="account" placeholder="اليوزر (سناب/إنستا)">
        <select name="bloodType">
            <option value="">فصيلة الدم</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
        <input type="text" name="medical" placeholder="حالة طبية أو حساسية؟">
        <input type="password" name="password" placeholder="كلمة سر (4 أرقام) *" maxlength="4" required>
        <input type="text" name="itemCode" id="itemCodeInput" readonly style="color: #666; background: #111;">
        <button type="submit" class="btn btn-submit">تفعيل الأثر</button>
    </form>
</div>

<div class="card" id="displayCard">
    <h1>أثَـــر</h1>
    <div class="tagline">معلومات صاحب الأثر</div>
    <div class="info-box"><span class="label">صاحب الأثر</span><div id="valName">-</div></div>
    <div class="info-box"><span class="label">رقم التواصل</span><div id="valPhone">-</div></div>
    <div class="info-box"><span class="label">الحساب</span><div id="valAccount">-</div></div>
    <div class="info-box"><span class="label">الحالة الطبية</span><div id="valMedical">-</div></div>
    <a href="" id="linkCall" class="btn btn-call">📞 إتصال مباشر</a>
</div>

<script>
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbw6rB7kFI9AqeoX6tBU6UM18ejOBitkCXnnbvoTgZr9UYy2MRpUOARMV_90cvyKV-Xf/exec';

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const welcomeText = document.getElementById('welcome-text');

        if (!code) {
            welcomeText.innerText = "يرجى مسح الكود من قطعة أثر";
            welcomeText.style.opacity = '1';
            return;
        }

        setTimeout(() => { welcomeText.style.opacity = '1'; }, 500);

        fetch(webAppUrl + "?itemCode=" + code)
        .then(res => res.json())
        .then(data => {
            if (data.status === "تم التفعيل") {
                document.getElementById('valName').innerText = data.name;
                document.getElementById('valPhone').innerText = data.phone;
                document.getElementById('valAccount').innerText = data.account || "غير متوفر";
                document.getElementById('valMedical').innerText = data.medical || "لا يوجد";
                document.getElementById('linkCall').href = "tel:" + data.phone;
                showCard('displayCard');
            } else {
                document.getElementById('itemCodeInput').value = code;
                showCard('activateCard');
            }
        })
        .catch(() => {
            document.getElementById('itemCodeInput').value = code;
            showCard('activateCard');
        });
    }

    function showCard(id) {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }, 1500);
    }

    window.onload = init;
</script>
</body>
</html>

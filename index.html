<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - الإرث الرقمي</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; justify-content: center; align-items: center;
            transition: opacity 1.5s ease-in-out;
        }
        #loading-text { font-size: 1.4rem; color: #2ecc71; text-shadow: 0 0 15px #2ecc71; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .card { 
            background: rgba(10, 30, 20, 0.85); 
            padding: 2rem; border-radius: 30px; 
            border: 2px solid rgba(46, 204, 113, 0.5); 
            width: 85%; max-width: 380px; 
            z-index: 2; backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.3);
            text-align: center; display: none;
            max-height: 85vh; overflow-y: auto;
        }

        h1 { margin: 0; font-size: 2.5rem; text-shadow: 0 0 20px #2ecc71; color: #fff; }
        .tagline { color: #00f2ff; font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }

        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: rgba(0, 50, 0, 0.2); border: 1px solid rgba(46, 204, 113, 0.3); 
            color: #fff; border-radius: 12px; box-sizing: border-box; text-align: right;
            transition: 0.3s;
        }
        select option { background: #0a1e14; color: #fff; }
        input:read-only { background: rgba(46, 204, 113, 0.05); color: #2ecc71; border-style: dashed; }
        input:focus { border-color: #00f2ff; outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .section-title { color: #2ecc71; font-size: 0.7rem; text-align: right; margin-top: 10px; font-weight: bold; opacity: 0.8; }

        button { 
            width: 100%; padding: 15px; margin-top: 15px;
            background: linear-gradient(135deg, #2ecc71, #00f2ff);
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000;
            font-size: 1rem; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        /* تنسيق بيانات العرض */
        .info-display { text-align: right; margin-top: 20px; }
        .info-item { margin-bottom: 12px; border-bottom: 1px solid rgba(46, 204, 113, 0.1); padding-bottom: 5px; }
        .label { color: #00f2ff; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .value { color: #fff; font-size: 1.1rem; font-weight: 500; }
        
        .card::-webkit-scrollbar { width: 4px; }
        .card::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 10px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div id="loading-text">جاري استحضار الأثر...</div>
</div>

<canvas id="chipCanvas"></canvas>

<div class="card" id="activationCard">
    <h1>أثَـــر</h1>
    <div class="tagline">تفعيل إرث جديد</div>
    <form id="activationForm">
        <input type="text" name="name" placeholder="صاحب الأثر *" required>
        <input type="tel" name="phone" placeholder="رقم الجوال *" required>
        <input type="email" name="email" placeholder="البريد الإلكتروني">
        
        <div class="section-title">البيانات الطبية</div>
        <select name="bloodType">
            <option value="">فصيلة الدم</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="O+">O+</option><option value="O-">O-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
        </select>
        <input type="text" name="medical" placeholder="حالات طبية / حساسية">

        <div class="section-title">الأمان</div>
        <input type="password" name="password" placeholder="أنشئ كلمة سر للأثر *" required>
        <input type="text" name="itemCode" id="itemCode" readonly>
        
        <button type="submit" id="submitBtn">بث الحياة في أثرك</button>
    </form>
</div>

<div class="card" id="viewCard">
    <h1>أثَـــر</h1>
    <div class="tagline">إرث رقمي حي</div>
    <div class="info-display" id="userData"></div>
    <button onclick="location.reload()" style="background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71;">تحديث الأثر</button>
</div>

<script>
    // الرابط الجديد الخاص بكِ
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwe5r_PdrN-5YbyChN24I1BeP4hYyA8_DhQqX5E6l8fAeWzohlg41WV5cnMIKwBidRd/exec';

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (!code) {
            document.getElementById('loading-text').innerText = "عذراً، كود القطعة غير موجود";
            return;
        }

        // جلب البيانات من السكريبت
        fetch(`${webAppUrl}?itemCode=${code}`)
        .then(res => res.json())
        .then(data => {
            // إخفاء شاشة التحميل
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 1000);

            if (data.status === "تم التفعيل") {
                document.getElementById('viewCard').style.display = 'block';
                document.getElementById('userData').innerHTML = `
                    <div class="info-item"><span class="label">صاحب الأثر</span><span class="value">${data.name}</span></div>
                    <div class="info-item"><span class="label">رقم التواصل</span><span class="value">${data.phone}</span></div>
                    <div class="info-item"><span class="label">فصيلة الدم</span><span class="value">${data.bloodType || 'غير محدد'}</span></div>
                    <div class="info-item"><span class="label">تنبيه طبي</span><span class="value">${data.medical || 'لا يوجد'}</span></div>
                `;
            } else {
                document.getElementById('activationCard').style.display = 'block';
                document.getElementById('itemCode').value = code;
            }
        })
        .catch(err => {
            document.getElementById('loading-text').innerText = "خطأ في الاتصال بالأثر";
        });
    };

    document.getElementById('activationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = 'جاري الحفظ...';

        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            body: new URLSearchParams(new FormData(this))
        })
        .then(() => {
            alert('تم التفعيل بنجاح! سيتم الآن عرض إرثك.');
            location.reload();
        });
    });

    // --- أنيميشن الخلفية ---
    const canvas = document.getElementById('chipCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; particles = []; for(let i=0; i<60; i++) particles.push(new P()); }
    class P {
        constructor() { this.reset(); }
        reset() { this.x = Math.random()*w; this.y = Math.random()*h; this.v = Math.random()*1.2+0.5; this.c = Math.random()>0.5?'#2ecc71':'#00f2ff'; }
        draw() { ctx.fillStyle=this.c; ctx.fillRect(this.x,this.y,2,2); this.y+=this.v; if(this.y>h) this.reset(); }
    }
    function animate() { ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h); particles.forEach(p=>p.draw()); requestAnimationFrame(animate); }
    init(); animate();
</script>
</body>
</html>

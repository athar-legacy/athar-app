<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثَـــر | ATHAR LEGACY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --neon-2: #00f2ff; }
        
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-y: auto; overflow-x: hidden;
        }

        /* خلفية الخطوط المشعة */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #loading-screen { 
            position: fixed; inset: 0; background: #000; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s; 
        }

        /* تصميم خطوط NFC المشعة بالكود */
        .nfc-circuit {
            position: absolute; width: 300px; height: 300px;
            border: 2px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 20px var(--neon); }
            50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 50px var(--neon-2); }
            100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 20px var(--neon); }
        }

        .loading-content {
            display: flex; flex-direction: column; align-items: center;
            width: 90%; text-align: center; z-index: 101;
        }

        .neon-msg { 
            font-size: 1.3rem; color: var(--neon); 
            text-shadow: 0 0 15px var(--neon); opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
            margin-bottom: 60px; min-height: 3.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .loader-wrapper { width: 60%; height: 2px; background: rgba(255,255,255,0.1); position: relative; }
        #loader-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.5s ease-out; }

        .card { 
            background: rgba(10, 30, 20, 0.95); padding: 2.5rem 2rem; 
            border-radius: 30px; border: 2px solid var(--neon); 
            width: 85%; max-width: 380px; z-index: 2; 
            backdrop-filter: blur(20px); text-align: center; 
            display: none; opacity: 0; transition: 0.8s; margin: 40px 0;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1); 
        }

        h1 { margin: 0; font-size: 2.3rem; text-shadow: 0 0 15px var(--neon); color: #fff; }
        .tagline { color: var(--neon-2); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 25px; }
        .info-box { background: rgba(255, 255, 255, 0.05); padding: 14px; border-radius: 15px; margin: 12px 0; border-right: 4px solid var(--neon); text-align: right; }
        .info-box strong { color: var(--neon-2); font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .info-box span { font-size: 1.05rem; word-break: break-all; color: #fff; display: block; }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; }
        .btn-call { background: var(--neon); }
        .btn-wa { background: #25D366; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: #fff; border-radius: 10px; text-align: right; box-sizing: border-box; font-size: 1rem; }
        #subBtn { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--neon), var(--neon-2)); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; margin-top: 15px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="nfc-circuit"></div>
    <div class="loading-content">
        <div id="m-text" class="neon-msg"></div>
        <div class="loader-wrapper"><div id="loader-bar"></div></div>
    </div>
</div>

<canvas id="chipCanvas"></canvas>

<div class="card" id="mainLanding">
    <h1>أثَـــر</h1>
    <div class="tagline">ATHAR LEGACY</div>
    <p style="line-height: 1.8;">مشروع يجمع بين الفن والتقنية لتوثيق الهوية بطريقة مبتكرة عبر تقنية NFC.</p>
    <div style="margin-top:20px; font-size:0.7rem; color:#666;">صُنع بواسطة Welf Bassam</div>
</div>

<div class="card" id="displayCard">
    <h1>أثَـــر</h1>
    <div class="tagline">بيانات صاحب الأثر</div>
    <div class="info-box"><strong>صاحب الأثر</strong> <span id="vName"></span></div>
    <div class="info-box"><strong>رقم الجوال</strong> <span id="vPhone"></span></div>
    <div class="info-box" id="vEmailBox" style="display:none;"><strong>البريد الإلكتروني</strong> <span id="vEmail"></span></div>
    <div class="info-box" id="vBloodBox"><strong>فصيلة الدم</strong> <span id="vBlood"></span></div>
    <div class="info-box" id="vMedBox" style="display:none;"><strong>الحالة الصحية</strong> <span id="vMed"></span></div>
    <div class="info-box" id="vAccBox" style="display:none;"><strong>التواصل</strong> <span id="vAcc"></span></div>
    <div class="btn-container">
        <a id="cBtn" class="btn btn-call"><i class="fas fa-phone"></i> اتصال</a>
        <a id="wBtn" class="btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
    </div>
</div>

<div class="card" id="regCard">
    <h1>أثَـــر</h1>
    <div class="tagline">تفعيل قطعة جديدة</div>
    <form id="regForm">
        <input type="text" id="regName" placeholder="الاسم الكامل *" required>
        <input type="tel" id="regPhone" placeholder="رقم الجوال *" required>
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني (اختياري)">
        <select id="regPlatform">
            <option value="">تطبيق التواصل (اختياري)</option>
            <option>Snapchat</option><option>Instagram</option><option>Telegram</option><option>X</option><option>TikTok</option>
        </select>
        <input type="text" id="regAcc" placeholder="اسم المستخدم">
        <select id="regBlood">
            <option value="">فصيلة الدم (اختياري)</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
        <input type="text" id="regMed" placeholder="أمراض مزمنة أو حساسية؟ (اختياري)">
        <input type="text" id="regPass" placeholder="كلمة السر (4 أرقام) *" pattern="\d{4}" maxlength="4" required>
        <input type="hidden" id="hCode">
        <button type="submit" id="subBtn">بث الحياة في أثرك</button>
    </form>
</div>

<script>
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbxMyRg-ci17i-_PEEOPr95W5EoU4skA4sGDdWk3D2q8QPeVMOfpQWjHsOKSBP3Q-bcq/exec';
    const code = new URLSearchParams(window.location.search).get('code');
    const bar = document.getElementById('loader-bar');
    const msgEl = document.getElementById('m-text');

    async function changeMsg(txt, p, duration = 1500) {
        msgEl.style.opacity = '0';
        await new Promise(r => setTimeout(r, 450));
        msgEl.innerText = txt;
        msgEl.style.opacity = '1';
        bar.style.width = p + '%';
        await new Promise(r => setTimeout(r, duration));
    }

    async function run() {
        if (!code) {
            await changeMsg('" كل ما نتركه خلفنا سيحكي عنا يوماً "', 100);
            finish('mainLanding');
            return;
        }
        await changeMsg('" كل ما نتركه خلفنا سيحكي عنا يوماً "', 25);
        await changeMsg('جاري البحث عن صاحب الأثر...', 60);
        try {
            const res = await fetch(`${webAppUrl}?read=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.status === "تم التفعيل") {
                await changeMsg('تم العثور على المعلومات!', 100, 800);
                document.getElementById('vName').innerText = data.name;
                document.getElementById('vPhone').innerText = data.phone;
                document.getElementById('vBlood').innerText = data.blood || "غير محدد";
                document.getElementById('cBtn').href = `tel:${data.phone}`;
                document.getElementById('wBtn').href = `https://wa.me/${data.phone}`;
                if(data.email && data.email !== "undefined" && data.email !== "") {
                    document.getElementById('vEmail').innerText = data.email;
                    document.getElementById('vEmailBox').style.display = 'block';
                }
                if(data.medical && data.medical !== "undefined" && data.medical !== "") {
                    document.getElementById('vMed').innerText = data.medical;
                    document.getElementById('vMedBox').style.display = 'block';
                }
                if(data.account && data.account !== "undefined" && data.account !== "") {
                    document.getElementById('vAcc').innerText = data.account;
                    document.getElementById('vAccBox').style.display = 'block';
                }
                finish('displayCard');
            } else {
                await changeMsg('مستخدم جديد.. مرحباً بك في عالم أثَر', 100, 1200);
                document.getElementById('hCode').value = code;
                finish('regCard');
            }
        } catch(e) { finish('mainLanding'); }
    }

    function finish(id) {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.opacity = '1', 50);
        }, 800);
    }

    window.onload = run;

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.innerText = 'جاري الحفظ...'; btn.disabled = true;
        const p = document.getElementById('regPlatform').value;
        const a = document.getElementById('regAcc').value;
        const params = new URLSearchParams();
        params.append('name', document.getElementById('regName').value);
        params.append('phone', document.getElementById('regPhone').value);
        params.append('email', document.getElementById('regEmail').value);
        params.append('account', p ? p + ": " + a : a);
        params.append('bloodType', document.getElementById('regBlood').value);
        params.append('medical', document.getElementById('regMed').value);
        params.append('password', document.getElementById('regPass').value);
        params.append('itemCode', document.getElementById('hCode').value);
        fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: params })
        .then(() => { alert('تم التفعيل!'); location.reload(); });
    };

    // كود الخطوط الإلكترونية المشعة (Canvas Logic)
    const canvas = document.getElementById('chipCanvas'), ctx = canvas.getContext('2d');
    let w, h, lines = [];
    function init() { 
        w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
        lines = []; for(let i=0; i<20; i++) lines.push(new Line());
    }
    class Line {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.v = Math.random() * 2 + 1; this.len = Math.random() * 100 + 50;
            this.ang = (Math.floor(Math.random() * 4) * 90) * Math.PI / 180;
        }
        draw() {
            ctx.beginPath(); ctx.strokeStyle = Math.random() > 0.5 ? '#00ffcc' : '#00f2ff';
            ctx.lineWidth = 0.5; ctx.moveTo(this.x, this.y);
            let x2 = this.x + Math.cos(this.ang) * this.len;
            let y2 = this.y + Math.sin(this.ang) * this.len;
            ctx.lineTo(x2, y2); ctx.stroke();
            this.x = x2; this.y = y2;
            if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
        }
    }
    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h);
        lines.forEach(l => l.draw()); requestAnimationFrame(draw);
    }
    init(); draw(); window.onresize = init;
</script>
</body>
</html>

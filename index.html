<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثَـــر | ATHAR LEGACY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00ffcc; --neon-2: #00f2ff; }
        
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden; /* منع التمرير أثناء التحميل */
        }

        /* حاوية الأنيميشن - تملأ الشاشة */
        #canvas-container {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
        }

        #nfc-canvas { width: 100%; height: 100%; }

        /* شاشة التحميل - شفافة لرؤية النبضات خلفها */
        #loading-screen { 
            position: fixed; inset: 0; 
            background: rgba(0, 0, 0, 0.7); /* تعتيم خفيف جداً */
            z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s; 
        }

        .loading-content {
            display: flex; flex-direction: column; align-items: center;
            width: 90%; text-align: center; z-index: 101;
        }

        .neon-msg { 
            font-size: 1.4rem; color: var(--neon); 
            text-shadow: 0 0 20px var(--neon); opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
            margin-bottom: 60px; min-height: 3.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .loader-wrapper { width: 60%; height: 2px; background: rgba(255,255,255,0.1); position: relative; }
        #loader-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.5s ease-out; }

        /* الكروت */
        .card { 
            background: rgba(10, 30, 20, 0.9); padding: 2.5rem 2rem; 
            border-radius: 30px; border: 1px solid var(--neon); 
            width: 85%; max-width: 380px; z-index: 2; 
            backdrop-filter: blur(15px); text-align: center; 
            display: none; opacity: 0; transition: 0.8s; margin: 40px 0;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); 
        }

        h1 { margin: 0; font-size: 2.3rem; text-shadow: 0 0 15px var(--neon); color: #fff; }
        .tagline { color: var(--neon-2); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 25px; }
        .info-box { background: rgba(255, 255, 255, 0.05); padding: 14px; border-radius: 15px; margin: 12px 0; border-right: 4px solid var(--neon); text-align: right; }
        .info-box strong { color: var(--neon-2); font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .info-box span { font-size: 1.05rem; word-break: break-all; color: #fff; display: block; }
        
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; }
        .btn-call { background: var(--neon); }
        .btn-wa { background: #25D366; }

        input, select { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: #fff; border-radius: 10px; text-align: right; box-sizing: border-box; font-size: 1rem; }
        #subBtn { width: 100%; padding: 16px; background: linear-gradient(90deg, var(--neon), var(--neon-2)); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; margin-top: 15px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="nfc-canvas"></canvas>
</div>

<div id="loading-screen">
    <div class="loading-content">
        <div id="m-text" class="neon-msg"></div>
        <div class="loader-wrapper"><div id="loader-bar"></div></div>
    </div>
</div>

<div class="card" id="mainLanding">
    <h1>أثَـــر</h1>
    <div class="tagline">ATHAR LEGACY</div>
    <p>مشروع يجمع بين الفن والتقنية لتوثيق الهوية بطريقة مبتكرة.</p>
</div>

<div class="card" id="displayCard">
    <h1>أثَـــر</h1>
    <div class="tagline">بيانات صاحب الأثر</div>
    <div class="info-box"><strong>صاحب الأثر</strong> <span id="vName"></span></div>
    <div class="info-box"><strong>رقم الجوال</strong> <span id="vPhone"></span></div>
    <div class="btn-container">
        <a id="cBtn" class="btn btn-call">اتصال</a>
        <a id="wBtn" class="btn btn-wa">واتساب</a>
    </div>
</div>

<div class="card" id="regCard">
    <h1>أثَـــر</h1>
    <div class="tagline">تفعيل قطعة جديدة</div>
    <form id="regForm">
        <input type="text" id="regName" placeholder="الاسم الكامل *" required>
        <input type="tel" id="regPhone" placeholder="رقم الجوال *" required>
        <input type="hidden" id="hCode">
        <button type="submit" id="subBtn">بث الحياة في أثرك</button>
    </form>
</div>

<script>
    // --- منطق البيانات (نفس كودك الأصلي) ---
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbxMyRg-ci17i-_PEEOPr95W5EoU4skA4sGDdWk3D2q8QPeVMOfpQWjHsOKSBP3Q-bcq/exec';
    const code = new URLSearchParams(window.location.search).get('code');
    const bar = document.getElementById('loader-bar');
    const msgEl = document.getElementById('m-text');

    async function changeMsg(txt, p, duration = 1200) {
        msgEl.style.opacity = '0';
        await new Promise(r => setTimeout(r, 400));
        msgEl.innerText = txt;
        msgEl.style.opacity = '1';
        bar.style.width = p + '%';
        await new Promise(r => setTimeout(r, duration));
    }

    async function run() {
        if (!code) { finish('mainLanding'); return; }
        await changeMsg('جاري مسح شريحة الأثر...', 40);
        try {
            const res = await fetch(`${webAppUrl}?read=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.status === "تم التفعيل") {
                document.getElementById('vName').innerText = data.name;
                document.getElementById('vPhone').innerText = data.phone;
                document.getElementById('cBtn').href = `tel:${data.phone}`;
                document.getElementById('wBtn').href = `https://wa.me/${data.phone}`;
                await changeMsg('تم العثور على الأثر!', 100, 500);
                finish('displayCard');
            } else {
                document.getElementById('hCode').value = code;
                finish('regCard');
            }
        } catch(e) { finish('mainLanding'); }
    }

    function finish(id) {
        document.getElementById('loading-screen').style.opacity = '0';
        document.body.style.overflow = 'auto';
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.opacity = '1', 50);
        }, 800);
    }

    // --- أنيميشن عروق الـ NFC المشعة المطور ---
    const canvas = document.getElementById('nfc-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<30; i++) particles.push(new Particle());
    }

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.speed = Math.random() * 1.5 + 0.5;
            this.life = Math.random() * 100 + 50;
            this.color = Math.random() > 0.5 ? '#00ffcc' : '#00f2ff';
            // الزوايا تعطي شكل الدوائر الإلكترونية (0, 45, 90 درجة)
            this.angle = (Math.floor(Math.random() * 8) * 45) * Math.PI / 180;
        }
        update() {
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.life--;
            // تغيير الاتجاه فجأة ليعطي شكل مسارات اللوحة الأم
            if(Math.random() < 0.02) this.angle = (Math.floor(Math.random() * 8) * 45) * Math.PI / 180;
            if(this.life <= 0 || this.x<0 || this.x>w || this.y<0 || this.y>h) this.reset();
        }
        draw() {
            ctx.beginPath();
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 1.5;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - Math.cos(this.angle)*15, this.y - Math.sin(this.angle)*15);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    function animate() {
        // نترك أثر خفيف وراء الخطوط ليعطي إيحاء الإشعاع
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }

    init(); animate(); window.onload = run; window.onresize = init;
</script>
</body>
</html>
